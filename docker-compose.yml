# Local backend stack WITHOUT a database — just Redis (behind an Upstash-
# compatible REST proxy, since the app talks to Redis via @upstash/redis
# over HTTP) and the API. Point DATABASE_URL at your hosted Postgres (Neon).
#
#   cp .env.example .env         # set DATABASE_URL + AUTH_SECRET first
#   docker compose up --build    # API on http://localhost:4000
#
# Migrations / seed run against whatever DATABASE_URL points at:
#   docker compose run --rm backend node dist/scripts/migrate.js
#   docker compose run --rm -v "$PWD/data:/app/data" backend node dist/scripts/seed.js

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Speaks the Upstash REST protocol the @upstash/redis client expects,
  # backed by the real Redis above.
  redis-http:
    image: hiett/serverless-redis-http:latest
    environment:
      SRH_MODE: env
      SRH_TOKEN: local-dev-token
      SRH_CONNECTION_STRING: redis://redis:6379
    ports:
      - "8079:80"
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build: .
    # DATABASE_URL and AUTH_SECRET come from your .env (copy .env.example).
    # DATABASE_URL should point at your external / hosted Postgres.
    env_file:
      - .env
    # These override anything in .env so the container always talks to the
    # local Redis proxy, whatever host Upstash creds you may have set.
    environment:
      NODE_ENV: development
      PORT: "4000"
      UPSTASH_REDIS_REST_URL: http://redis-http:80
      UPSTASH_REDIS_REST_TOKEN: local-dev-token
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      redis-http:
        condition: service_started
